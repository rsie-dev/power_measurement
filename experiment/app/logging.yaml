version: 1
disable_existing_loggers: False
formatters:
    console:
        format: "%(asctime)s - %(levelname)s - %(message)s"
    console_output:
        format: "%(message)s"
    console_color:
        (): "uvicorn.logging.DefaultFormatter"
        fmt: "%(asctime)s.%(msecs)03d %(levelprefix)s %(message)s"
        datefmt: "%H:%M:%S"
        use_colors: None
    file:
        (): app.logging.ISO8601Formatter
        format: "%(asctime)s %(filename)s(%(lineno)d) %(levelname)-7s %(name)s: %(message)s"

    #access:
    #    (): "uvicorn.logging.AccessFormatter"
    #    fmt: '%(levelprefix)s %(client_addr)s - "%(request_line)s" %(status_code)s'  # noqa: E501

handlers:
    console:
        class: logging.StreamHandler
        formatter: console_color
        stream: ext://sys.stderr
    console_warn:
        class: logging.StreamHandler
        formatter: console_color
        stream: ext://sys.stderr
        level: WARN
    file:
        class: logging.FileHandler
        mode: w
        level: DEBUG
        formatter: file
        filename: /dev/null
loggers:
    "":
        level: DEBUG
        handlers: [console, file]
    uvicorn.access:
        propagate: False
        handlers: [file]
    invoke:
        level: INFO
    paramiko:
        level: INFO
    paramiko.transport:
        propagate: false
        level: INFO
        handlers: [console_warn, file]
